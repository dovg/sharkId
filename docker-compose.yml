services:

  # ── MinIO ───────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"   # S3 API — local only
      - "127.0.0.1:9001:9001"   # Web console — local only
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO bucket init (runs once, exits) ────────────
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET:        ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set download local/$$MINIO_BUCKET &&
        echo 'Bucket ready: '$$MINIO_BUCKET
      "

  # ── FastAPI backend ──────────────────────────────────
  backend:
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL:        postgresql://${POSTGRES_USER}@172.17.0.1:5432/${POSTGRES_DB}
      MINIO_ENDPOINT:      minio:9000
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET:        ${MINIO_BUCKET}
      ML_SERVICE_URL:      http://ml:${ML_PORT}
      JWT_SECRET:          ${JWT_SECRET}
      JWT_ALGORITHM:       ${JWT_ALGORITHM}
      JWT_EXPIRY_HOURS:    ${JWT_EXPIRY_HOURS}
      PHOTO_BASE_URL:      ${PHOTO_BASE_URL}
    volumes:
      - ./backend:/app      # bind mount: code changes apply on restart (no rebuild needed)
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8000"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML service ───────────────────────────────────────
  ml:
    restart: unless-stopped
    build:
      context: ./ml
      dockerfile: Dockerfile
    environment:
      ML_CONFIDENCE_THRESHOLD: ${ML_CONFIDENCE_THRESHOLD:-0.5}
      VIDEO_FRAME_INTERVAL:    ${VIDEO_FRAME_INTERVAL:-2.0}
    volumes:
      - ./ml:/app           # bind mount: code changes apply on restart; /app/data holds embeddings
    ports:
      - "127.0.0.1:${ML_PORT}:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── nginx (single entry point on port 80) ───────────
  nginx:
    restart: unless-stopped
    image: nginx:stable-alpine
    volumes:
        - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        - ./frontend-dist:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
